<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0f172a" rx="12"/>

  <!-- Left page -->
  <path d="M 20 20 L 48 20 L 48 80 Q 45 82 42 80 L 20 80 Z" fill="#1e40af"/>

  <!-- Right page -->
  <path d="M 52 20 L 80 20 L 80 80 Q 77 82 74 80 L 52 80 Z" fill="#3b82f6"/>

  <!-- Gold binding spine -->
  <rect x="47" y="20" width="6" height="60" fill="#d4af37"/>

  <!-- Gold decorative border top -->
  <line x1="20" y1="20" x2="80" y2="20" stroke="#d4af37" stroke-width="1.5"/>
  <line x1="20" y1="80" x2="80" y2="80" stroke="#d4af37" stroke-width="1.5"/>

  <!-- Left page text lines (Arabic RTL style) -->
  <line x1="42" y1="30" x2="26" y2="30" stroke="#dbeafe" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="42" y1="38" x2="24" y2="38" stroke="#dbeafe" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="42" y1="46" x2="28" y2="46" stroke="#dbeafe" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="40" y1="54" x2="26" y2="54" stroke="#dbeafe" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="42" y1="62" x2="24" y2="62" stroke="#dbeafe" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

  <!-- Right page text lines (Arabic RTL style) -->
  <line x1="74" y1="30" x2="58" y2="30" stroke="#dbeafe" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="74" y1="38" x2="56" y2="38" stroke="#dbeafe" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="74" y1="46" x2="60" y2="46" stroke="#dbeafe" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="72" y1="54" x2="58" y2="54" stroke="#dbeafe" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="74" y1="62" x2="56" y2="62" stroke="#dbeafe" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

  <!-- Islamic geometric accent (corner flourish) -->
  <circle cx="50" cy="50" r="4" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <circle cx="50" cy="50" r="2.5" fill="#fbbf24" opacity="0.6"/>
</svg>